packages:
  - apps/*
  - packages/*
  - scripts

catalogMode: prefer

catalog:
  "@types/node": ^24
  effect: 4.0.0-beta.99
  typescript: ^7.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vite-plus: 0.2.5
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
allowBuilds:
  msgpackr-extract: true
